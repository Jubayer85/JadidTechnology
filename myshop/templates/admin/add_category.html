{% extends 'admin/base_admin.html' %}

{% block title %}Add Category - Admin Dashboard{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto py-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Add New Category</h1>
            <p class="text-gray-600 mt-1">Create a new product category</p>
        </div>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Category Name *
                    </label>
                    <input type="text" name="name" required 
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Icon Class
                    </label>
                    <input type="text" name="icon" value="fas fa-boxes"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500">
                    <p class="text-xs text-gray-500 mt-1">
                        Font Awesome icon class (e.g., fas fa-boxes, fas fa-mobile)
                    </p>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Description
                </label>
                <textarea name="description" rows="4"
                          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Category Image
                </label>
                <input type="file" name="image" accept="image/*"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg">
            </div>
            
            <div class="flex items-center">
                <input type="checkbox" name="is_active" id="is_active" checked
                       class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                <label for="is_active" class="ml-2 block text-sm text-gray-700">
                    Active (Visible to customers)
                </label>
            </div>
            
            <div class="flex justify-end space-x-3 pt-4">
                <a href="{% url 'manage_categories' %}"
                   class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">
                    Cancel
                </a>
                <button type="submit"
                        class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">
                    Add Category
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
