<form 
    hx-post="{% url 'admin_dashboard:add_subcategory' %}"
    hx-target="this"
    hx-swap="outerHTML"
    class="space-y-5">

    {% csrf_token %}

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
            Parent Category
        </label>
        {{ form.category }}
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
            Subcategory Name
        </label>
        {{ form.name }}
    </div>

    <div class="flex items-center gap-2">
        {{ form.is_active }}
        <label class="text-sm text-gray-700">Active</label>
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t">
        <button type="button"
            onclick="document.getElementById('addSubcategoryModal').classList.add('hidden')"
            class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200">
            Cancel
        </button>
        <button type="submit"
            class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
            Save Subcategory
        </button>
    </div>
</form>
