<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | MobileShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#2563eb',
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 flex items-center justify-center px-4">

<!-- Container -->
<div class="w-full max-w-md bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8">

    <!-- Header -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white">
            Create Account
        </h1>
        <p class="text-slate-400 mt-2 text-sm">
            Join <span class="text-brand font-semibold">MobileShop</span> and start shopping
        </p>
    </div>

    <!-- Form -->
    <form method="post" class="space-y-5">
        {% csrf_token %}

        {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
                <p class="text-red-500 text-xs mt-1">
                    {{ field.errors|striptags }}
                </p>
            {% endif %}
        </div>
        {% endfor %}

        <!-- Submit -->
        <button type="submit"
            class="w-full py-3 rounded-xl bg-brand text-white font-semibold tracking-wide hover:bg-blue-500 transition">
            Create Account
        </button>
    </form>

    <!-- Footer -->
    <div class="mt-6 text-center text-sm text-slate-400">
        Already have an account?
        <a href="{% url 'login' %}" class="text-brand hover:underline font-medium">
            Login
        </a>
    </div>

</div>

<!-- Input styling -->
<style>
    input {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        background-color: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
    }

    input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb;
    }
</style>

</body>
</html>
