<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">

<form method="post" class="bg-slate-800 p-8 rounded-xl w-96">
    {% csrf_token %}
    <h2 class="text-2xl font-bold text-white mb-6">Login</h2>

    {{ form.as_p }}

    <button class="w-full mt-4 bg-blue-600 text-white py-2 rounded">
        Login
    </button>
</form>

</body>
</html>
